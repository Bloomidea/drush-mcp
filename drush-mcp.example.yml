# drush-mcp configuration
# Copy to drush-mcp.yml in your project root or home directory.
# Or pass --config <path> to use a custom location.

sites:
  # Local development (DDEV, Lando, or plain Drush)
  local:
    transport: local
    command: ddev drush
    # command: lando drush
    # command: drush
    # uri: https://mysite.ddev.site

  # Production via SSH
  # production:
  #   transport: ssh
  #   host: example.com
  #   user: deploy
  #   root: /var/www/html
  #   drush: vendor/bin/drush
  #   uri: https://example.com
  #   timeout: 60

  # Docker with static container name
  # staging:
  #   transport: docker
  #   host: staging.example.com
  #   user: deploy
  #   container: drupal-web
  #   drush: vendor/bin/drush
  #   uri: https://staging.example.com
  #   timeout: 30

  # Docker with dynamic container lookup (Coolify, Swarm, etc.)
  # production:
  #   transport: docker
  #   host: example.com
  #   user: root
  #   containerFilter: "label=coolify.serviceName=myapp-web"
  #   drush: vendor/bin/drush
  #   uri: https://example.com
  #   timeout: 60

defaults:
  timeout: 30
  # drush: vendor/bin/drush
