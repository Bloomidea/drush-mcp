name: Split Drush Bridge

on:
  push:
    branches: [main]
    paths:
      - 'packages/drush-bridge/**'
  release:
    types: [published]

jobs:
  split:
    name: Subtree split to Bloomidea/drush-bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and push
        env:
          GITHUB_TOKEN: ${{ secrets.BRIDGE_DEPLOY_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create subtree split
          SHA=$(git subtree split --prefix=packages/drush-bridge -b split-bridge)

          # Push to the bridge repo
          git remote add bridge "https://x-access-token:${GITHUB_TOKEN}@github.com/Bloomidea/drush-bridge.git"
          git push bridge split-bridge:main --force

      - name: Tag bridge repo on release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.BRIDGE_DEPLOY_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git tag "$TAG_NAME" split-bridge
          git push bridge "$TAG_NAME"
